# Sample Service Configuration for Linux Service Manager
# This file demonstrates the configuration format

[Service]
# Service name (used in commands)
Name = sample-webserver

# Command to execute (can be any shell command)
Command = python3 -m http.server 8080

# User to run as (optional, omit for current user)
# User = www-data

# Working directory (defaults to current directory when started)
WorkingDir = /var/www/html

# PID file location (default: /var/run/NAME.pid)
# PIDFile = /var/run/sample-webserver.pid

# Environment variables (one per line)
Environment = PORT=8080
Environment = LOG_LEVEL=info
Environment = APP_ENV=production

# Auto-restart on failure (true/false, default: false)
AutoRestart = false

[Description]
# Human-readable description
This service runs a simple HTTP server on port 8080.
It serves files from /var/www/html.

# Usage:
#   ./linux-service-manager.py start --config examples/sample-webserver.conf
#   ./linux-service-manager.py status --name sample-webserver
#   ./linux-service-manager.py stop --name sample-webserver
